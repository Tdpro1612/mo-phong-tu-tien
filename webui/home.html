<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Cơ Lục - Game Wiki Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="/webui/style.css">
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1>THIÊN CƠ LỤC</h1>
        </div>
        <div class="tree-container">
            <div id="tree-menu">
                </div>
        </div>
    </div>

    <div id="content-viewport">
        <div id="welcome-view">
            <h2>BẢN ĐỒ THIẾT KẾ DỮ LIỆU CỐT LÕI</h2>
            <p>Chọn một hệ thống bên cây thư mục để nạp tài liệu Template và bảng số liệu thực tế từ Database</p>
        </div>
        
        <div id="content-card" class="wiki-card" style="display: none;">
            <div id="content-area"></div>
        </div>
    </div>

    <script src="/webui/app.js"></script>
</body>
</html>
